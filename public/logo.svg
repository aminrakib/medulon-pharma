<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="100%" height="100%">
  <!-- Definitions for gradients or smooth rendering adjustments -->
  <defs>
    <style>
      .brand-blue { fill: #113668; }
      .text-main { font-family: 'Arial Black', 'Impact', sans-serif; font-weight: 900; font-size: 32px; letter-spacing: 1px; fill: #113668; }
      .text-sub { font-family: 'Arial', sans-serif; font-weight: 300; font-size: 12px; letter-spacing: 11px; fill: #113668; }
    </style>
  </defs>

  <!-- Group containing the "M" Emblem Circle -->
  <g transform="translate(10, 10)">
    <!-- Outer thick blue ring -->
    <circle cx="40" cy="40" r="38" class="brand-blue" />
    <!-- Inner white circle padding -->
    <circle cx="40" cy="40" r="32" fill="#ffffff" />
    <!-- Center blue circle holding the M -->
    <circle cx="40" cy="40" r="28" class="brand-blue" />
    
    <!-- Stylized White "M" inside the circle -->
    <path d="M 23,55 
             L 23,28 
             C 23,28 29,24 34,34 
             L 40,46 
             L 46,34 
             C 51,24 57,28 57,28 
             L 57,55 
             L 52,55 
             L 52,36 
             L 43,53 
             L 37,53 
             L 28,36 
             L 28,55 
             Z" 
          fill="#ffffff" />
  </g>

  <!-- Typography Alignment matching the flyer -->
  <g transform="translate(110, 48)">
    <text x="0" y="0" class="text-main">MEDULON</text>
    <text x="5" y="22" class="text-sub">PHARMA</text>
  </g>
</svg>
